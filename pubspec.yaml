name: dev_metrics
description: "Dev Metrics Flutter"
publish_to: "none"
version: 1.0.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2
  timezone: ^0.11.0
  provider: ^6.1.5
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  app_settings: ^7.0.0
  sentry_flutter: ^9.19.0
  font_awesome_flutter: ^11.0.0
  go_router: ^17.2.2
  supabase_flutter: ^2.12.4
  fl_chart: ^1.2.0
  printing: ^5.14.3
  pdf: ^3.12.0
  fpdart: ^1.2.0
  flutter_screenutil: ^5.9.3
  flutter_animate: ^4.5.2
  equatable: ^2.0.8
  logger: ^2.7.0
  internet_connection_checker_plus: ^2.9.1+2
  http: ^1.6.0
  hugeicons: ^1.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  sentry_dart_plugin: ^3.2.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/translations/
    - assets/icons/
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter_dev_metrics
  org: victorzarzar
